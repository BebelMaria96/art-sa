<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f5f0" />
  <meta name="description" content="Art Sã: um espaço diário e silencioso para a sua prática criativa. Jornada de 12 semanas, páginas matinais e reflexões." />
  <title>Art Sã · sua prática criativa</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&family=Newsreader:ital,opsz@0,6..72;1,6..72&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Tela de abertura / respiro -->
  <div id="splash" class="splash">
    <p class="splash__line">O objetivo não é fazer arte,</p>
    <p class="splash__line">é estar naquele estado</p>
    <p class="splash__line">que torna a arte inevitável.</p>
  </div>

  <main id="view" class="view" aria-live="polite"></main>

  <!-- Navegação inferior -->
  <nav class="nav" id="nav" aria-label="Navegação principal">
    <button class="nav__item" data-route="hoje" aria-label="Hoje">
      <span class="nav__icon">◯</span><span class="nav__label">Hoje</span>
    </button>
    <button class="nav__item" data-route="paginas" aria-label="Páginas Matinais">
      <span class="nav__icon">✎</span><span class="nav__label">Páginas</span>
    </button>
    <button class="nav__item" data-route="jornada" aria-label="Jornada">
      <span class="nav__icon">❋</span><span class="nav__label">Jornada</span>
    </button>
    <button class="nav__item" data-route="sintonizar" aria-label="Sintonizar">
      <span class="nav__icon">☼</span><span class="nav__label">Sintonizar</span>
    </button>
    <button class="nav__item" data-route="mais" aria-label="Mais ferramentas">
      <span class="nav__icon">⋯</span><span class="nav__label">Mais</span>
    </button>
  </nav>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
